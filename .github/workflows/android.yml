name: Build Android

on:
  push:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            "extras;android;m2repository" \
            "extras;google;m2repository"

      - name: Install Haxelib Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install flixel-addons --quiet
          haxelib install hxcpp --quiet

      - name: Build Android
        run: |
          export ANDROID_SDK=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/25.2.9519653
          export PATH=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          haxelib run lime setup android
          haxelib run lime build android -debug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strident-Crisis-Shader-generator-android
          path: export/android/bin/app/build/outputs/apk/
